services:
  ssh-cible:
    container_name: ssh-cible
    image: ssh-cible-shared:latest
    build:
      context: .
      dockerfile: DockerFile
      args:
        USERNAME: ${SSH_USERNAME:-pfe_user}
    env_file:
      - .env
    environment:
      SSH_PASSWORD: ${SSH_PASSWORD}
      TAILSCALE_AUTHKEY: ${TAILSCALE_AUTHKEY_1}
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME_1}
      WAZUH_AGENT_NAME: ${WAZUH_AGENT_NAME_1}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
    restart: unless-stopped
    networks:
      - default # Réseau totalement isolé

  ssh-cible-2:
    container_name: ssh-cible-2
    image: ssh-cible-shared:latest
    build:
      context: .
      dockerfile: DockerFile
      args:
        USERNAME: ${SSH_USERNAME:-pfe_user}
    env_file:
      - .env
    environment:
      SSH_PASSWORD: ${SSH_PASSWORD}
      TAILSCALE_AUTHKEY: ${TAILSCALE_AUTHKEY_2}
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME_2}
      WAZUH_AGENT_NAME: ${WAZUH_AGENT_NAME_2}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state-2:/var/lib/tailscale
    restart: unless-stopped
    networks:
      - default # Réseau totalement isolé

networks:
  default:
    internal: false # Permet la communication entre les conteneurs

volumes:
  tailscale-state:
  tailscale-state-2:
