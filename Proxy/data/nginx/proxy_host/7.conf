# ------------------------------------------------------------
# authentik.sbihi.tech
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "authentik-server-1";
  set $port           9090;

  listen 80;
listen [::]:80;

listen 443 ssl;
listen [::]:443 ssl;


  server_name authentik.sbihi.tech;
http2 off;


  # Custom SSL
  ssl_certificate /data/custom_ssl/npm-3/fullchain.pem;
  ssl_certificate_key /data/custom_ssl/npm-3/privkey.pem;












    # Force SSL
    
    set $trust_forwarded_proto "F";
    
    include conf.d/include/force-ssl.conf;




proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;
proxy_http_version 1.1;


  access_log /data/logs/proxy-host-7_access.log proxy;
  error_log /data/logs/proxy-host-7_error.log warn;

# On force le protocole HTTPS pour que les cookies soient marqués "Secure"
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Forwarded-Scheme https;

# On active le support WebSocket (indispensable pour l'échange de jetons)
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# On augmente les buffers car les jetons Tailscale sont très volumineux
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;





  location / {









    
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;
    

    # Proxy!
    include conf.d/include/proxy.conf;
  }


  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
