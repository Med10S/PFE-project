version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iam_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iam_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iam_network

  # Flask Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iam_web
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam_network
      - authentik_network
    command: python3 app.py
volumes:
  postgres_data:

networks:
  iam_network:
    driver: bridge
  authentik_network:
    external: true
