services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-page-app
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_USE_SSL: "false"
      AUTHENTIK_REDIRECT_URI: https://sbihi.tech/auth/callback
    expose:
      - "5000"
    networks:
      existing_external_net:
        aliases:
          - web
    restart: unless-stopped

